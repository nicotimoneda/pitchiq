name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Instalar uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      # los tests de red (marker "network") quedan excluidos por defecto
      # via addopts en pyproject.toml: en CI solo corren los sintéticos
      - name: Tests
        run: uv run pytest

  docker:
    # smoke test: la imagen de la app (deps mínimas, sin ML) construye
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Docker build
        run: docker build -t pitchiq-app .
      - name: La imagen no arrastra deps de ML
        run: |
          docker run --rm pitchiq-app pip list > deps.txt
          ! grep -iE "^(torch|langgraph|anthropic|sentence-transformers)" deps.txt
